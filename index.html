<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Center</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Game Center</h1>
        <p>Welcome to your personal arcade. Select a game to start playing!</p>
    </header>

    <main>
        <div class="game-grid">
            <!-- Tic-Tac-Toe Card -->
            <div class="game-card">
                <div class="game-icon" style="background-color: #4a90e2;"></div>
                <div class="game-info">
                    <h2>Tic-Tac-Toe</h2>
                    <p>A classic game of strategy and skill. Can you outsmart your opponent?</p>
                    <a href="games/tictactoe/index.html" class="play-button">Play Now</a>
                </div>
            </div>

<!-- Apocalypse Card -->
            <div class="game-card">
                <div class="game-icon" style="background-color: #333;"></div>
                <div class="game-info">
                    <h2>Apocalypse Dashboard</h2>
                    <p>A gritty, text-based roguelike adventure in a ruined city.</p>
                    <a href="games/apocalypse/index.html" class="play-button">Play Now</a>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Game Center</p>
    </footer>
</body>
</html>
